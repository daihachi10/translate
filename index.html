<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translate | daihachi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Modern Google Translate / Material 3 Styling */
    :root {
      --font-family: 'Roboto', 'Segoe UI', sans-serif;

      /* Light Theme (Material 3) */
      --bg-page: #ffffff;
      --text-main: #1f1f1f;
      --text-muted: #444746;
      --text-disabled: #747775;
      --border-color: #747775;
      --border-light: #c7c7c7;

      /* Accents */
      --color-primary: #0b57d0;
      /* Deep blue */
      --bg-pill-active: #d3e3fd;
      /* Light blue pill */
      --text-pill-active: #041e49;

      /* Panels */
      --bg-input: #ffffff;
      --bg-output: #f0f4f9;
      /* Modern light blue-grey */

      /* Interaction */
      --hover-bg: rgba(68, 71, 70, 0.08);
      --hover-bg-blue: rgba(11, 87, 208, 0.08);

      --status-success: #146c2e;
      --status-error: #b3261e;
    }

    [data-theme="dark"] {
      /* Dark Theme */
      --bg-page: #1f1f1f;
      --text-main: #e3e3e3;
      --text-muted: #c4c7c5;
      --text-disabled: #8e918f;
      --border-color: #8e918f;
      --border-light: #444746;

      --color-primary: #a8c7fa;
      --bg-pill-active: #004a77;
      --text-pill-active: #c2e7ff;

      --bg-input: #1f1f1f;
      --bg-output: #282a2c;

      --hover-bg: rgba(196, 199, 197, 0.08);
      --hover-bg-blue: rgba(168, 199, 250, 0.08);

      --status-success: #6dd58c;
      --status-error: #f2b8b5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
    }

    /* Top Navigation */
    .top-nav {
      width: 100%;
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .brand-logo {
      width: 80px;
      height: auto;
    }

    .brand-title {
      color: var(--text-muted);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Icon Button (Circular) */
    .btn-icon {
      background: none;
      border: none;
      color: var(--text-muted);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s;
    }

    .btn-icon:hover {
      background-color: var(--hover-bg);
    }

    .btn-icon svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* Layout Container */
    .app-container {
      width: 100%;
      max-width: 1280px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Feature Pills (Text, Image, Documents, Websites) */
    .feature-pills {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 36px;
      border-radius: 18px;
      border: 1px solid var(--border-light);
      background-color: transparent;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill:hover {
      background-color: var(--hover-bg);
    }

    .pill.active {
      background-color: var(--bg-pill-active);
      color: var(--text-pill-active);
      border-color: transparent;
    }

    .pill svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Settings Panel */
    .settings-panel {
      background-color: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .settings-panel.open {
      display: flex;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .settings-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .settings-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .settings-input {
      width: 100%;
      background-color: transparent;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 14px 40px 14px 16px;
      color: var(--text-main);
      font-size: 16px;
      font-family: monospace;
    }

    .settings-input:focus {
      outline: none;
      border-color: var(--color-primary);
      border-width: 2px;
      padding: 13px 39px 13px 15px;
      /* Offset border width */
    }

    .toggle-visibility {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }

    .toggle-visibility svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* Plan Group */
    .plan-group {
      display: flex;
      gap: 12px;
    }

    .plan-btn {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .plan-btn.active {
      background-color: var(--bg-pill-active);
      color: var(--text-pill-active);
      border-color: transparent;
    }

    .save-settings-btn {
      background-color: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: 20px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: fit-content;
    }

    [data-theme="dark"] .save-settings-btn {
      color: #041e49;
    }

    .save-settings-btn:hover {
      opacity: 0.9;
    }

    /* Warning Banner */
    .warning-bar {
      background-color: #fce8e6;
      color: #c5221f;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 8px;
    }

    [data-theme="dark"] .warning-bar {
      background-color: #5c1e19;
      color: #f2b8b5;
    }

    .warning-btn {
      background: none;
      border: 1px solid currentColor;
      color: inherit;
      padding: 6px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    /* Translation Area Layout */
    .translation-area {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Language Bar */
    .lang-bar {
      display: flex;
      align-items: center;
      width: 100%;
      margin-bottom: 12px;
      position: relative;
    }

    .lang-section {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .lang-btn:hover {
      background-color: var(--hover-bg);
      color: var(--text-main);
    }

    .lang-btn.active {
      color: var(--color-primary);
    }

    /* To simulate the modern blue underline, we use an inner span or just text color */
    .lang-btn.active span {
      position: relative;
    }

    .lang-btn.active span::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: var(--color-primary);
      border-radius: 3px 3px 0 0;
    }

    .lang-dropdown-btn {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang-dropdown-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Swap Button in middle */
    .swap-btn-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .swap-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s;
    }

    .swap-btn:hover {
      background-color: var(--hover-bg);
    }

    .swap-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* Translator Boxes Container */
    .panels-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 280px;
    }

    @media (max-width: 800px) {
      .panels-container {
        grid-template-columns: 1fr;
      }

      .lang-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .swap-btn-container {
        padding: 8px 0;
        align-self: center;
        transform: rotate(90deg);
      }
    }

    /* Individual Panel */
    .panel {
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .input-panel {
      background-color: var(--bg-input);
      border: 1px solid var(--border-light);
    }

    .output-panel {
      background-color: var(--bg-output);
      border: 1px solid transparent;
      /* Keeps layout stable */
    }

    [data-theme="dark"] .input-panel {
      border-color: var(--border-color);
    }

    .textarea-wrapper {
      flex: 1;
      padding: 20px 24px;
      position: relative;
    }

    .textarea-main {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      resize: none;
      font-size: 24px;
      font-family: var(--font-family);
      color: var(--text-main);
      outline: none;
      line-height: 1.4;
    }

    .textarea-main::placeholder {
      color: var(--text-muted);
      opacity: 0.8;
    }

    .output-view {
      width: 100%;
      height: 100%;
      font-size: 24px;
      color: var(--text-main);
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
      line-height: 1.4;
    }

    .output-view.empty {
      color: var(--text-muted);
      opacity: 0.8;
    }

    /* Panel Footer Actions */
    .panel-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      min-height: 56px;
    }

    .action-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .char-count {
      font-size: 12px;
      color: var(--text-disabled);
      padding: 0 8px;
    }

    .char-count.warning {
      color: var(--status-error);
      font-weight: 500;
    }

    /* Loading Overlay */
    .loading-shimmer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(240, 244, 249, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    [data-theme="dark"] .loading-shimmer {
      background-color: rgba(40, 42, 44, 0.5);
    }

    .loading-shimmer.active {
      display: flex;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(0, 0, 0, 0.05);
      border-left-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background-color: var(--text-main);
      color: var(--bg-page);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast svg {
      width: 18px;
      height: 18px;
      fill: var(--status-success);
    }

    /* Native select styling inside the dropdown tab */
    .hidden-select {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      top: 0;
      left: 0;
    }

    .dropdown-container {
      position: relative;
    }

    /* History & Saved Circular Bottom Buttons */
    .bottom-actions {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 48px;
    }

    .bottom-action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .bottom-action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background-color 0.2s;
    }

    .bottom-action-btn:hover {
      background-color: var(--hover-bg);
    }

    .bottom-action-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .bottom-action-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .bottom-action-btn.active {
      background-color: var(--bg-pill-active);
      color: var(--text-pill-active);
      border-color: transparent;
    }

    .library-panel {
      display: none;
      background-color: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      margin-top: 24px;
      overflow: hidden;
    }

    .library-panel.open {
      display: block;
    }

    .library-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .library-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-main);
    }

    .library-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .library-list {
      max-height: 360px;
      overflow: auto;
    }

    .library-empty {
      padding: 32px 20px;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
    }

    .library-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .library-item:last-child {
      border-bottom: none;
    }

    .library-text {
      min-width: 0;
    }

    .library-source,
    .library-target {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
      line-height: 1.45;
    }

    .library-source {
      color: var(--text-main);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .library-target {
      color: var(--text-muted);
      font-size: 13px;
    }

    .library-meta {
      color: var(--text-disabled);
      font-size: 12px;
      margin-top: 8px;
    }

    .library-item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .star-btn.saved {
      color: var(--color-primary);
    }

    @media (max-width: 640px) {
      .library-item {
        grid-template-columns: 1fr;
      }

      .library-item-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>

  <div class="app-container">

    <!-- Feature Pills -->

  <script>
    // State management
    const state = {
      apiKey: '',
      isPro: false,
      theme: 'light',
      debounceTimer: null,
      autoTargetLanguageDetermined: false,
      userManuallySelectedTarget: false,
      lastInputText: '',
      isTranslating: false,
      history: [],
      saved: [],
      activeLibrary: null,

      sourceLang: 'auto',
      targetLang: 'en-us'
    };

    const STORAGE_KEYS = {
      history: 'translation_history',
      saved: 'translation_saved'
    };

    // DOM Elements
    const elements = {
      body: document.body,
      toggleSettingsBtn: document.getElementById('toggle-settings-btn'),
      toggleThemeBtn: document.getElementById('toggle-theme-btn'),
      themeIcon: document.getElementById('theme-icon'),
      settingsPanel: document.getElementById('settings-panel'),
      apiKeyInput: document.getElementById('api-key-input'),
      toggleVisibilityBtn: document.getElementById('toggle-visibility-btn'),
      visibilityIcon: document.getElementById('visibility-icon'),
      planFree: document.getElementById('plan-free'),
      planPro: document.getElementById('plan-pro'),
      saveSettingsBtn: document.getElementById('save-settings-btn'),
      apiWarningBanner: document.getElementById('api-warning-banner'),
      apiWarningSetupBtn: document.getElementById('api-warning-setup-btn'),

      sourceTabs: document.getElementById('source-tabs'),
      targetTabs: document.getElementById('target-tabs'),
      sourceLangSelect: document.getElementById('source-lang-select'),
      targetLangSelect: document.getElementById('target-lang-select'),

      sourceTextarea: document.getElementById('source-textarea'),
      targetOutput: document.getElementById('target-output'),
      charCounter: document.getElementById('char-counter'),
      clearTextBtn: document.getElementById('clear-text-btn'),
      swapLangBtn: document.getElementById('swap-lang-btn'),

      loadingOverlay: document.getElementById('loading-overlay'),
      copyBtn: document.getElementById('copy-btn'),
      copyIcon: document.getElementById('copy-icon'),
      saveTranslationBtn: document.getElementById('save-translation-btn'),
      saveTranslationIcon: document.getElementById('save-translation-icon'),
      historyBtn: document.getElementById('history-btn'),
      savedBtn: document.getElementById('saved-btn'),
      libraryPanel: document.getElementById('library-panel'),
      libraryTitle: document.getElementById('library-title'),
      libraryList: document.getElementById('library-list'),
      clearLibraryBtn: document.getElementById('clear-library-btn'),
      closeLibraryBtn: document.getElementById('close-library-btn'),
      toastMessage: document.getElementById('toast-message'),
      toastText: document.getElementById('toast-text')
    };

    // Initialize Page
    function init() {
      // Load Theme (Auto detect system preference or load from storage)
      const savedTheme = localStorage.getItem('app_theme');
      if (savedTheme) {
        state.theme = savedTheme;
      } else {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        state.theme = prefersDark ? 'dark' : 'light';
      }
      elements.body.setAttribute('data-theme', state.theme);
      updateThemeIcon();

      // Load API Settings
      state.apiKey = localStorage.getItem('deepl_api_key') || '';
      state.isPro = localStorage.getItem('deepl_is_pro') === 'true';
      state.history = loadStoredItems(STORAGE_KEYS.history);
      state.saved = loadStoredItems(STORAGE_KEYS.saved);

      // UI setting restore
      elements.apiKeyInput.value = state.apiKey;
      setPlan(state.isPro, false);
      updateAPIStatus();

      // Settings toggles
      elements.toggleSettingsBtn.addEventListener('click', () => elements.settingsPanel.classList.toggle('open'));
      elements.toggleThemeBtn.addEventListener('click', toggleTheme);
      elements.toggleVisibilityBtn.addEventListener('click', toggleKeyVisibility);
      elements.saveSettingsBtn.addEventListener('click', saveSettings);
      elements.apiWarningSetupBtn.addEventListener('click', () => {
        elements.settingsPanel.classList.add('open');
        elements.apiKeyInput.focus();
      });

      // Tab handlers
      setupLanguageTabListeners();

      // Select dropdown changes
      elements.sourceLangSelect.addEventListener('change', handleSourceSelectChange);
      elements.targetLangSelect.addEventListener('change', handleTargetSelectChange);

      // Text events
      elements.sourceTextarea.addEventListener('input', handleSourceInput);
      elements.clearTextBtn.addEventListener('click', clearInput);
      elements.swapLangBtn.addEventListener('click', swapLanguages);

      // Ctrl + Enter shortcut
      elements.sourceTextarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          triggerTranslation(true);
        }
      });

      // Copy click
      elements.copyBtn.addEventListener('click', copyTranslation);
      elements.saveTranslationBtn.addEventListener('click', toggleSaveCurrentTranslation);
      elements.historyBtn.addEventListener('click', () => toggleLibrary('history'));
      elements.savedBtn.addEventListener('click', () => toggleLibrary('saved'));
      elements.closeLibraryBtn.addEventListener('click', closeLibrary);
      elements.clearLibraryBtn.addEventListener('click', clearActiveLibrary);
      elements.libraryList.addEventListener('click', handleLibraryClick);

      // Focus
      elements.sourceTextarea.focus();
    }

    // Toggle Theme
    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      elements.body.setAttribute('data-theme', state.theme);
      localStorage.setItem('app_theme', state.theme);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      if (state.theme === 'light') {
        // Dark Mode Icon (Moon) to switch TO dark mode
        elements.themeIcon.innerHTML = `<path d="M12 3c.132 0 .263 0 .393.007a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 2.99z"/>`;
        elements.toggleThemeBtn.setAttribute('title', 'ダークモードに切り替え');
      } else {
        // Light Mode Icon (Sun) to switch TO light mode
        elements.themeIcon.innerHTML = `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>`;
        elements.toggleThemeBtn.setAttribute('title', 'ライトモードに切り替え');
      }
    }

    // Toggle password eye icon
    function toggleKeyVisibility() {
      const type = elements.apiKeyInput.getAttribute('type') === 'password' ? 'text' : 'password';
      elements.apiKeyInput.setAttribute('type', type);
      if (type === 'text') {
        elements.visibilityIcon.innerHTML = `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0-4C7 3 2.73 6.11 1 10.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 6.11 17 3 12 3zm0 13c-3.03 0-5.5-2.47-5.5-5.5S8.97 5 12 5s5.5 2.47 5.5 5.5S15.03 16 12 16z"/>`;
      } else {
        elements.visibilityIcon.innerHTML = `<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>`;
      }
    }

    // Plan Toggle Settings
    function setPlan(isPro, shouldSave = true) {
      state.isPro = isPro;
      if (isPro) {
        elements.planPro.classList.add('active');
        elements.planFree.classList.remove('active');
      } else {
        elements.planFree.classList.add('active');
        elements.planPro.classList.remove('active');
      }
    }

    // Save Settings
    function saveSettings() {
      const key = elements.apiKeyInput.value.trim();
      state.apiKey = key;

      localStorage.setItem('deepl_api_key', key);
      localStorage.setItem('deepl_is_pro', state.isPro);

      updateAPIStatus();
      showToast('設定を保存しました！');
      elements.settingsPanel.classList.remove('open');

      if (elements.sourceTextarea.value.trim()) {
        triggerTranslation(true);
      }
    }

    // Update Banner UI
    function updateAPIStatus() {
      if (state.apiKey) {
        elements.apiWarningBanner.style.display = 'none';
      } else {
        elements.apiWarningBanner.style.display = 'flex';
      }
    }

    // Language selector tabs
    function setupLanguageTabListeners() {
      // Source Tabs
      const sourceTabs = elements.sourceTabs.querySelectorAll('.lang-btn:not(.dropdown-container)');
      sourceTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          sourceTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          elements.sourceLangSelect.value = '';
          state.sourceLang = tab.getAttribute('data-value');
          triggerTranslation(true);
        });
      });

      // Target Tabs
      const targetTabs = elements.targetTabs.querySelectorAll('.lang-btn:not(.dropdown-container)');
      targetTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          targetTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          elements.targetLangSelect.value = '';
          state.targetLang = tab.getAttribute('data-value');
          state.userManuallySelectedTarget = true;
          triggerTranslation(true);
        });
      });
    }

    function handleSourceSelectChange() {
      const val = elements.sourceLangSelect.value;
      if (!val) return;

      const sourceTabs = elements.sourceTabs.querySelectorAll('.lang-btn:not(.dropdown-container)');
      sourceTabs.forEach(t => t.classList.remove('active'));
      elements.sourceTabs.querySelector('.lang-dropdown-btn').classList.add('active');

      state.sourceLang = val;
      triggerTranslation(true);
    }

    function handleTargetSelectChange() {
      const val = elements.targetLangSelect.value;
      if (!val) return;

      const targetTabs = elements.targetTabs.querySelectorAll('.lang-btn:not(.dropdown-container)');
      targetTabs.forEach(t => t.classList.remove('active'));
      elements.targetTabs.querySelector('.lang-dropdown-btn').classList.add('active');

      state.targetLang = val;
      state.userManuallySelectedTarget = true;
      triggerTranslation(true);
    }

    // Dynamic switching and input validation
    function handleSourceInput() {
      const text = elements.sourceTextarea.value;
      const length = text.length;

      // Update counter UI
      elements.charCounter.textContent = `${length.toLocaleString()} / 5,000`;
      if (length > 5000) {
        elements.charCounter.classList.add('warning');
      } else {
        elements.charCounter.classList.remove('warning');
      }

      if (length === 0) {
        state.autoTargetLanguageDetermined = false;
        state.userManuallySelectedTarget = false;
        clearOutput();
        return;
      }

      updateSaveButtonState();

      // Auto Target Swapping Heuristics
      if (!state.userManuallySelectedTarget && !state.autoTargetLanguageDetermined) {
        const hasJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(text);
        if (hasJapanese) {
          setTargetLanguageUI('en-us');
          setSourceLanguageUI('auto');
          state.autoTargetLanguageDetermined = true;
        } else {
          const hasLatin = /[a-zA-Z]/.test(text);
          if (hasLatin) {
            setTargetLanguageUI('ja');
            setSourceLanguageUI('auto');
            state.autoTargetLanguageDetermined = true;
          }
        }
      }

      // Debounce logic
      clearTimeout(state.debounceTimer);
      state.debounceTimer = setTimeout(() => {
        triggerTranslation(false);
      }, 800);
    }

    // Set UI helpers for setting source / target
    function setSourceLanguageUI(langVal) {
      state.sourceLang = langVal;
      const tabs = elements.sourceTabs.querySelectorAll('.lang-btn:not(.dropdown-container)');
      let matchedTab = false;
      tabs.forEach(t => {
        if (t.getAttribute('data-value') === langVal) {
          t.classList.add('active');
          matchedTab = true;
        } else {
          t.classList.remove('active');
        }
      });

      if (!matchedTab) {
        elements.sourceLangSelect.value = langVal;
        elements.sourceTabs.querySelector('.lang-dropdown-btn').classList.add('active');
      } else {
        elements.sourceLangSelect.value = '';
        elements.sourceTabs.querySelector('.lang-dropdown-btn').classList.remove('active');
      }
    }

    function setTargetLanguageUI(langVal) {
      state.targetLang = langVal;
      const tabs = elements.targetTabs.querySelectorAll('.lang-btn:not(.dropdown-container)');
      let matchedTab = false;
      tabs.forEach(t => {
        if (t.getAttribute('data-value') === langVal) {
          t.classList.add('active');
          matchedTab = true;
        } else {
          t.classList.remove('active');
        }
      });

      if (!matchedTab) {
        elements.targetLangSelect.value = langVal;
        elements.targetTabs.querySelector('.lang-dropdown-btn').classList.add('active');
      } else {
        elements.targetLangSelect.value = '';
        elements.targetTabs.querySelector('.lang-dropdown-btn').classList.remove('active');
      }
    }

    // Swap Source and Target Languages
    function swapLanguages() {
      let currentSrc = state.sourceLang;
      let currentTgt = state.targetLang;

      if (currentTgt.startsWith('en')) currentTgt = 'en';
      if (currentTgt.startsWith('pt')) currentTgt = 'pt';

      if (currentSrc === 'auto') {
        if (currentTgt === 'ja') {
          setSourceLanguageUI('ja');
          setTargetLanguageUI('en-us');
        } else {
          setSourceLanguageUI(currentTgt);
          setTargetLanguageUI('ja');
        }
      } else {
        setSourceLanguageUI(currentTgt);
        setTargetLanguageUI(currentSrc === 'en' ? 'en-us' : (currentSrc === 'pt' ? 'pt-br' : currentSrc));
      }

      state.userManuallySelectedTarget = true;

      const srcText = elements.sourceTextarea.value.trim();
      const tgtText = elements.targetOutput.textContent.trim();

      if (srcText && !elements.targetOutput.classList.contains('empty') && tgtText) {
        elements.sourceTextarea.value = tgtText;
        elements.targetOutput.textContent = srcText;
        elements.charCounter.textContent = `${tgtText.length.toLocaleString()} / 5,000`;
        state.lastInputText = tgtText;
      }

      triggerTranslation(true);
    }

    // Clear Text Action
    function clearInput() {
      elements.sourceTextarea.value = '';
      elements.charCounter.textContent = '0 / 5,000';
      elements.charCounter.classList.remove('warning');
      state.autoTargetLanguageDetermined = false;
      state.userManuallySelectedTarget = false;
      clearOutput();
      elements.sourceTextarea.focus();
    }

    function clearOutput() {
      elements.targetOutput.textContent = '翻訳';
      elements.targetOutput.classList.add('empty');
      updateSaveButtonState();
    }

    // Call CF Serverless API
    async function triggerTranslation(isManual = false) {
      const text = elements.sourceTextarea.value.trim();

      if (!text) {
        clearOutput();
        return;
      }

      if (!isManual && text === state.lastInputText) {
        return;
      }

      if (!state.apiKey) {
        if (isManual) {
          elements.settingsPanel.classList.add('open');
          elements.apiKeyInput.focus();
          showToast('APIキーを入力してください。', true);
        }
        return;
      }

      state.lastInputText = text;
      state.isTranslating = true;
      elements.loadingOverlay.classList.add('active');

      try {
        const response = await fetch('/api/translate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            apiKey: state.apiKey,
            text: text,
            targetLang: state.targetLang,
            sourceLang: state.sourceLang,
            isPro: state.isPro
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || `Error status: ${response.status}`);
        }

        if (data.translations && data.translations.length > 0) {
          elements.targetOutput.textContent = data.translations[0].text;
          elements.targetOutput.classList.remove('empty');
          addHistoryItem(text, data.translations[0].text);
          updateSaveButtonState();
        } else {
          throw new Error('翻訳データが空でした。');
        }

      } catch (error) {
        console.error('Translation error:', error);
        elements.targetOutput.innerHTML = `<span style="color: var(--status-error); font-weight: 500;">エラー: ${error.message}</span>`;
        elements.targetOutput.classList.remove('empty');
      } finally {
        state.isTranslating = false;
        elements.loadingOverlay.classList.remove('active');
      }
    }

    function loadStoredItems(key) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.warn(`Failed to load ${key}:`, error);
        return [];
      }
    }

    function persistStoredItems(key, items) {
      localStorage.setItem(key, JSON.stringify(items));
    }

    function createTranslationItem(sourceText, targetText) {
      return {
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
        sourceText,
        targetText,
        sourceLang: state.sourceLang,
        targetLang: state.targetLang,
        createdAt: new Date().toISOString()
      };
    }

    function isSameTranslation(item, sourceText, targetText) {
      return item.sourceText === sourceText && item.targetText === targetText;
    }

    function addHistoryItem(sourceText, targetText) {
      if (!sourceText || !targetText) return;

      const item = createTranslationItem(sourceText, targetText);
      state.history = [
        item,
        ...state.history.filter(existing => !isSameTranslation(existing, sourceText, targetText))
      ].slice(0, 50);

      persistStoredItems(STORAGE_KEYS.history, state.history);
      renderLibraryIfOpen('history');
    }

    function getCurrentTranslation() {
      const sourceText = elements.sourceTextarea.value.trim();
      const targetText = elements.targetOutput.textContent.trim();

      if (
        !sourceText ||
        state.isTranslating ||
        sourceText !== state.lastInputText ||
        elements.targetOutput.classList.contains('empty') ||
        !targetText
      ) {
        return null;
      }

      return { sourceText, targetText };
    }

    function findSavedCurrentIndex() {
      const current = getCurrentTranslation();
      if (!current) return -1;
      return state.saved.findIndex(item => isSameTranslation(item, current.sourceText, current.targetText));
    }

    function toggleSaveCurrentTranslation() {
      const current = getCurrentTranslation();
      if (!current) {
        showToast('保存する翻訳結果がありません。', true);
        return;
      }

      const existingIndex = findSavedCurrentIndex();
      if (existingIndex >= 0) {
        state.saved.splice(existingIndex, 1);
        showToast('保存済みから削除しました。');
      } else {
        state.saved.unshift(createTranslationItem(current.sourceText, current.targetText));
        showToast('翻訳を保存しました！');
      }

      persistStoredItems(STORAGE_KEYS.saved, state.saved);
      updateSaveButtonState();
      renderLibraryIfOpen('saved');
    }

    function updateSaveButtonState() {
      const isSaved = findSavedCurrentIndex() >= 0;
      elements.saveTranslationBtn.classList.toggle('saved', isSaved);
      elements.saveTranslationBtn.setAttribute('title', isSaved ? '保存済みから削除' : '翻訳を保存');
      elements.saveTranslationIcon.innerHTML = isSaved
        ? `<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>`
        : `<path d="M22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.45 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.03 4.38.38-3.32 2.88 1 4.28L12 15.4z"/>`;
    }

    function toggleLibrary(type) {
      if (state.activeLibrary === type && elements.libraryPanel.classList.contains('open')) {
        closeLibrary();
        return;
      }

      state.activeLibrary = type;
      elements.libraryPanel.classList.add('open');
      elements.historyBtn.classList.toggle('active', type === 'history');
      elements.savedBtn.classList.toggle('active', type === 'saved');
      renderLibrary();
    }

    function closeLibrary() {
      state.activeLibrary = null;
      elements.libraryPanel.classList.remove('open');
      elements.historyBtn.classList.remove('active');
      elements.savedBtn.classList.remove('active');
    }

    function renderLibraryIfOpen(type) {
      if (state.activeLibrary === type && elements.libraryPanel.classList.contains('open')) {
        renderLibrary();
      }
    }

    function renderLibrary() {
      const type = state.activeLibrary;
      const items = type === 'saved' ? state.saved : state.history;
      elements.libraryTitle.textContent = type === 'saved' ? '保存済み' : '履歴';
      elements.clearLibraryBtn.style.display = items.length ? 'flex' : 'none';

      if (!items.length) {
        elements.libraryList.innerHTML = `<div class="library-empty">${type === 'saved' ? '保存済みの翻訳はまだありません。' : '履歴はまだありません。'}</div>`;
        return;
      }

      elements.libraryList.innerHTML = items.map(item => `
        <article class="library-item" data-id="${escapeAttr(item.id)}">
          <div class="library-text">
            <div class="library-source">${escapeHTML(item.sourceText)}</div>
            <div class="library-target">${escapeHTML(item.targetText)}</div>
            <div class="library-meta">${formatDate(item.createdAt)} · ${escapeHTML(item.sourceLang)} → ${escapeHTML(item.targetLang)}</div>
          </div>
          <div class="library-item-actions">
            <button class="btn-icon" data-action="load" title="この翻訳を開く" style="width: 40px; height: 40px;">
              <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5h3V8h4v4h3l-5 5z"/></svg>
            </button>
            <button class="btn-icon" data-action="delete" title="削除" style="width: 40px; height: 40px;">
              <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
          </div>
        </article>
      `).join('');
    }

    function handleLibraryClick(event) {
      const button = event.target.closest('button[data-action]');
      if (!button || !state.activeLibrary) return;

      const itemElement = button.closest('.library-item');
      const itemId = itemElement?.dataset.id;
      const list = state.activeLibrary === 'saved' ? state.saved : state.history;
      const item = list.find(entry => entry.id === itemId);
      if (!item) return;

      if (button.dataset.action === 'load') {
        loadTranslationItem(item);
      } else if (button.dataset.action === 'delete') {
        deleteLibraryItem(itemId);
      }
    }

    function loadTranslationItem(item) {
      elements.sourceTextarea.value = item.sourceText;
      elements.targetOutput.textContent = item.targetText;
      elements.targetOutput.classList.remove('empty');
      elements.charCounter.textContent = `${item.sourceText.length.toLocaleString()} / 5,000`;
      elements.charCounter.classList.toggle('warning', item.sourceText.length > 5000);
      setSourceLanguageUI(item.sourceLang || 'auto');
      setTargetLanguageUI(item.targetLang || 'en-us');
      state.lastInputText = item.sourceText;
      state.userManuallySelectedTarget = true;
      updateSaveButtonState();
      showToast('翻訳を開きました。');
    }

    function deleteLibraryItem(itemId) {
      if (state.activeLibrary === 'saved') {
        state.saved = state.saved.filter(item => item.id !== itemId);
        persistStoredItems(STORAGE_KEYS.saved, state.saved);
        updateSaveButtonState();
      } else {
        state.history = state.history.filter(item => item.id !== itemId);
        persistStoredItems(STORAGE_KEYS.history, state.history);
      }

      renderLibrary();
      showToast('削除しました。');
    }

    function clearActiveLibrary() {
      if (!state.activeLibrary) return;

      if (state.activeLibrary === 'saved') {
        state.saved = [];
        persistStoredItems(STORAGE_KEYS.saved, state.saved);
        updateSaveButtonState();
      } else {
        state.history = [];
        persistStoredItems(STORAGE_KEYS.history, state.history);
      }

      renderLibrary();
      showToast('一覧を削除しました。');
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHTML(value);
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString('ja-JP', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Copy to Clipboard Action
    async function copyTranslation() {
      const text = elements.targetOutput.textContent;
      if (elements.targetOutput.classList.contains('empty') || !text) {
        showToast('コピーする翻訳結果がありません。', true);
        return;
      }

      try {
        await navigator.clipboard.writeText(text);

        elements.copyIcon.innerHTML = `<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>`;
        elements.copyBtn.style.color = 'var(--status-success)';

        showToast('コピーしました！');

        setTimeout(() => {
          elements.copyIcon.innerHTML = `<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>`;
          elements.copyBtn.style.color = '';
        }, 2000);

      } catch (err) {
        console.error('Copy failed:', err);
        showToast('コピーできませんでした。', true);
      }
    }

    // Toast UI helper
    let toastTimer;
    function showToast(message, isError = false) {
      const toast = elements.toastMessage;
      document.getElementById('toast-text').textContent = message;

      const icon = toast.querySelector('svg');
      if (isError) {
        toast.style.backgroundColor = 'var(--status-error)';
        toast.style.color = 'var(--text-main)'; // In dark mode, ensure text is legible
        icon.innerHTML = `<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>`;
      } else {
        toast.style.backgroundColor = 'var(--text-main)';
        toast.style.color = 'var(--bg-page)';
        icon.innerHTML = `<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>`;
      }

      toast.classList.add('show');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
